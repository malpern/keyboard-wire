<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a1a"/>

  <!-- Subtle grid pattern background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#b81c1c"/>

  <!-- Keyboard icon (simplified) -->
  <rect x="80" y="280" width="200" height="100" rx="10" fill="none" stroke="#f5f1e8" stroke-width="3" opacity="0.3"/>
  <rect x="96" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="118" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="140" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="162" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="184" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="206" y="296" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="234" y="296" width="28" height="16" rx="2" fill="#b81c1c" opacity="0.4"/>
  <rect x="100" y="318" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="122" y="318" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="144" y="318" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="166" y="318" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="188" y="318" width="16" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>
  <rect x="120" y="340" width="100" height="16" rx="2" fill="#f5f1e8" opacity="0.25"/>

  <!-- Wire lines from keyboard -->
  <line x1="280" y1="330" x2="370" y2="330" stroke="#b81c1c" stroke-width="2" opacity="0.5" stroke-dasharray="6 4"/>

  <!-- Title -->
  <text x="400" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" letter-spacing="-0.03em" fill="#f5f1e8">Keyboard</text>
  <text x="400" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" letter-spacing="-0.03em" fill="#f5f1e8">Newswire</text>

  <!-- Tagline -->
  <text x="400" y="390" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="22" fill="#8a8a8a" letter-spacing="0.02em">A curated digest of mechanical keyboard news</text>

  <!-- Bottom rule -->
  <line x1="400" y1="420" x2="700" y2="420" stroke="#333" stroke-width="1"/>

  <!-- URL -->
  <text x="400" y="460" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="16" fill="#5a5a5a" letter-spacing="0.04em">keyboard-newswire.com</text>
</svg>
