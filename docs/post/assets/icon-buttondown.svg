<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a1a1a"/>

  <!-- Keyboard body -->
  <rect x="96" y="200" width="320" height="160" rx="16" fill="none" stroke="#f5f1e8" stroke-width="6"/>

  <!-- Key rows -->
  <!-- Row 1 -->
  <rect x="120" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="156" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="192" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="228" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="264" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="300" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="336" y="220" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="372" y="220" width="28" height="28" rx="4" fill="#b81c1c"/>

  <!-- Row 2 -->
  <rect x="130" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="166" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="202" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="238" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="274" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="310" y="256" width="28" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="346" y="256" width="54" height="28" rx="4" fill="#f5f1e8" opacity="0.7"/>

  <!-- Row 3 - spacebar -->
  <rect x="160" y="292" width="196" height="28" rx="4" fill="#f5f1e8" opacity="0.9"/>
  <rect x="120" y="292" width="32" height="28" rx="4" fill="#f5f1e8" opacity="0.7"/>
  <rect x="364" y="292" width="36" height="28" rx="4" fill="#f5f1e8" opacity="0.7"/>

  <!-- Wire/signal lines emanating upward -->
  <line x1="256" y1="190" x2="256" y2="140" stroke="#b81c1c" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="200" y2="110" stroke="#b81c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="312" y2="110" stroke="#b81c1c" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="256" y2="100" stroke="#b81c1c" stroke-width="2" stroke-linecap="round"/>

  <!-- Small dots at wire endpoints -->
  <circle cx="200" cy="108" r="4" fill="#b81c1c"/>
  <circle cx="256" cy="98" r="4" fill="#b81c1c"/>
  <circle cx="312" cy="108" r="4" fill="#b81c1c"/>

  <!-- Subtle "KW" text -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" letter-spacing="0.08em" fill="#f5f1e8" opacity="0.4">KW</text>
</svg>
